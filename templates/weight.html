{% extends "base.html" %}

{% block content %}
<h2>Gewichtstracking</h2>

<form method="POST">
    <label>Gewicht in kg:</label>
    <input type="number" step="0.1" name="weight" required>

    <label>Datum:</label>
    <input type="date" name="date">

    <button type="submit">Gewicht speichern</button>
</form>

<h3>Dein Verlauf</h3>

{% if entries %}
<table>
    <tr>
        <th>Datum</th>
        <th>Gewicht</th>
    </tr>

    {% for entry in entries %}
    <tr>
        <td>{{ entry.date }}</td>
        <td>{{ entry.weight }} kg</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Noch keine Gewichtseinträge vorhanden.</p>
{% endif %}

<a class="button" href="{{ url_for('dashboard') }}">Zurück zum Dashboard</a>
{% endblock %}
