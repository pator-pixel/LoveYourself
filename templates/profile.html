{% extends "base.html" %}

{% block content %}
<h2>Dein Profil</h2>

<form method="POST">
    <h3>Persönliche Daten</h3>

    <label>Alter:</label>
    <input type="number" name="age" value="{{ profile.age if profile else '' }}">

    <label>Geschlecht:</label>
    <select name="gender">
        <option value="">Bitte wählen</option>
        <option value="female" {% if profile and profile.gender == "female" %}selected{% endif %}>Weiblich</option>
        <option value="male" {% if profile and profile.gender == "male" %}selected{% endif %}>Männlich</option>
        <option value="diverse" {% if profile and profile.gender == "diverse" %}selected{% endif %}>Divers</option>
    </select>

    <label>Größe in cm:</label>
    <input type="number" step="0.1" name="height" value="{{ profile.height if profile else '' }}">

    <label>Aktuelles Gewicht in kg:</label>
    <input type="number" step="0.1" name="weight" value="{{ profile.weight if profile else '' }}">

    <label>Zielgewicht in kg:</label>
    <input type="number" step="0.1" name="goal_weight" value="{{ profile.goal_weight if profile else '' }}">

    <h3>Ernährung</h3>

    <label>Ernährungsform:</label>
    <select name="diet_type">
        <option value="normal" {% if profile and profile.diet_type == "normal" %}selected{% endif %}>Normal</option>
        <option value="vegetarian" {% if profile and profile.diet_type == "vegetarian" %}selected{% endif %}>Vegetarisch</option>
        <option value="vegan" {% if profile and profile.diet_type == "vegan" %}selected{% endif %}>Vegan</option>
    </select>

    <label>Allergien:</label>
    <textarea name="allergies">{{ profile.allergies if profile else '' }}</textarea>

    <label>Krankheiten:</label>
    <textarea name="diseases">{{ profile.diseases if profile else '' }}</textarea>

    <label>Körperliche Einschränkungen:</label>
    <textarea name="limitations">{{ profile.limitations if profile else '' }}</textarea>

    <label>Lebensmittel, die du gerne isst:</label>
    <textarea name="liked_foods">{{ profile.liked_foods if profile else '' }}</textarea>

    <label>Lebensmittel, die du nicht magst:</label>
    <textarea name="disliked_foods">{{ profile.disliked_foods if profile else '' }}</textarea>

    <h3>Training</h3>

    <label>Fitnesslevel:</label>
    <select name="fitness_level">
        <option value="beginner" {% if profile and profile.fitness_level == "beginner" %}selected{% endif %}>Anfänger</option>
        <option value="intermediate" {% if profile and profile.fitness_level == "intermediate" %}selected{% endif %}>Mittel</option>
        <option value="advanced" {% if profile and profile.fitness_level == "advanced" %}selected{% endif %}>Profi</option>
    </select>

    <label>Trainingstage pro Woche:</label>
    <input type="number" name="training_days" min="0" max="7" value="{{ profile.training_days if profile else '' }}">

    <label>Fitnessstudio vorhanden?</label>
    <select name="has_gym">
        <option value="no" {% if profile and not profile.has_gym %}selected{% endif %}>Nein</option>
        <option value="yes" {% if profile and profile.has_gym %}selected{% endif %}>Ja</option>
    </select>

    <label>Home-Equipment:</label>
    <textarea name="home_equipment">{{ profile.home_equipment if profile else '' }}</textarea>

    <button type="submit">Profil speichern</button>
</form>
{% endblock %}
